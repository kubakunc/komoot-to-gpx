<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2670" width="1200" height="2670" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- Play screenshot 4/4: GPX saved, ready for any device. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" /><stop offset="100%" stop-color="#eef0f0" />
    </linearGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" /><stop offset="100%" stop-color="#fbfbfb" />
    </linearGradient>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3e6" /><stop offset="100%" stop-color="#e6efe0" />
    </linearGradient>
    <filter id="phoneShadow" x="-15%" y="-8%" width="130%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="rgba(0,0,0,0.16)" />
    </filter>
    <clipPath id="appiconClip"><rect width="100" height="100" rx="22.37" ry="22.37" /></clipPath>
    <symbol id="appicon" viewBox="0 0 100 100">
      <g clip-path="url(#appiconClip)">
        <rect width="100" height="100" fill="#FC4C02" />
        <path d="M0 57 L22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33 L100 28 L100 100 L0 100 Z" fill="#5E9E2E" />
        <path d="M22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33" fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="22" cy="53" r="4.6" fill="#FFFFFF" /><circle cx="77" cy="33" r="4.6" fill="#FFFFFF" />
        <circle cx="72" cy="73.5" r="14.5" fill="#FFFFFF" />
        <g fill="none" stroke="#15191C" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M72 66.5 V76" /><path d="M66.8 71.6 L72 77 L77.2 71.6" /><path d="M66 80.5 H78" />
        </g>
      </g>
    </symbol>
  </defs>

  <rect width="1200" height="2670" fill="url(#bg)" />
  <polygon points="0,0 1200,0 1200,150 0,420" fill="#5E9E2E" opacity="0.08" />

  <!-- Headline -->
  <g transform="translate(100 230)">
    <text x="0" y="70" font-size="72" font-weight="700" fill="#15191C" letter-spacing="-2">Ready for</text>
    <text x="0" y="158" font-size="72" font-weight="700" fill="#15191C" letter-spacing="-2">any <tspan fill="#5E9E2E">device.</tspan></text>
    <text x="0" y="232" font-size="34" fill="#525252">Garmin, Wahoo, your watch — anywhere GPX goes.</text>
  </g>

  <!-- Phone -->
  <g transform="translate(220 560)">
    <rect width="760" height="1880" rx="64" fill="url(#phoneBg)" stroke="#e4e4e7" stroke-width="2" filter="url(#phoneShadow)" />
    <rect x="22" y="22" width="716" height="1836" rx="46" fill="#ffffff" />
    <!-- dim the screen behind the dialog -->
    <rect x="22" y="22" width="716" height="1836" rx="46" fill="#15191C" opacity="0.04" />
    <!-- status bar -->
    <text x="60" y="78" font-size="26" font-weight="600" fill="#15191C">9:03</text>
    <g transform="translate(700 70)" fill="#15191C"><rect x="-44" y="-16" width="34" height="18" rx="3" /></g>
    <!-- faint map behind -->
    <rect x="60" y="170" width="640" height="420" rx="24" fill="url(#mapBg)" opacity="0.5" />
    <path d="M 130 510 C 230 360, 330 450, 400 320 C 460 210, 560 250, 640 190"
          fill="none" stroke="#FC4C02" stroke-width="9" stroke-linecap="round" opacity="0.45" />

    <!-- Saved dialog -->
    <g transform="translate(80 760)">
      <rect width="600" height="600" rx="36" fill="#ffffff" filter="url(#phoneShadow)" />
      <!-- success check -->
      <circle cx="300" cy="160" r="78" fill="#eef7e3" />
      <circle cx="300" cy="160" r="54" fill="#5E9E2E" />
      <path d="M 274 160 L 292 178 L 328 142" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />

      <text x="300" y="300" text-anchor="middle" font-size="44" font-weight="700" fill="#15191C">GPX saved</text>

      <!-- file chip -->
      <rect x="70" y="350" width="460" height="92" rx="16" fill="#f5f5f6" />
      <g transform="translate(118 396)">
        <rect x="-22" y="-26" width="44" height="52" rx="6" fill="#fff" stroke="#c9c9ce" stroke-width="2.5" />
        <text x="0" y="10" text-anchor="middle" font-size="17" font-weight="800" fill="#5E9E2E">GPX</text>
      </g>
      <text x="166" y="388" font-size="27" font-weight="600" fill="#15191C">saturday-gravel-loop.gpx</text>
      <text x="166" y="424" font-size="23" fill="#737373">Downloads</text>

      <text x="300" y="500" text-anchor="middle" font-size="25" fill="#737373">Ready for your watch or bike computer.</text>

      <rect x="70" y="528" width="460" height="44" rx="10" fill="none" />
      <rect x="160" y="528" width="280" height="2" fill="none" />
    </g>

    <!-- device row under dialog -->
    <g transform="translate(0 1440)" text-anchor="middle" fill="#9a9a9f" font-size="26" font-weight="600">
      <text x="380" y="0">Garmin · Wahoo · Hammerhead · Coros · Suunto</text>
    </g>
  </g>
</svg>
