<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Play Store feature graphic: 1024×500. Brand = "route divider" icon
       (Strava orange + Komoot green), name "Export GPX for Komoot, Strava". -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f4f5" />
    </linearGradient>
    <clipPath id="mark"><rect width="100" height="100" rx="22.37" ry="22.37" /></clipPath>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)" />

  <!-- Diagonal duotone accent band (orange → green), echoes the icon -->
  <polygon points="0,500 0,430 1024,250 1024,330 260,500" fill="#FC4C02" opacity="0.10" />
  <polygon points="0,500 360,500 1024,355 1024,420" fill="#5E9E2E" opacity="0.12" />

  <!-- Dot grid -->
  <g fill="rgba(0,0,0,0.06)">
    <g id="dots">
      <circle cx="32" cy="32" r="2" /><circle cx="96" cy="32" r="2" /><circle cx="160" cy="32" r="2" />
      <circle cx="224" cy="32" r="2" /><circle cx="288" cy="32" r="2" /><circle cx="352" cy="32" r="2" />
      <circle cx="416" cy="32" r="2" /><circle cx="480" cy="32" r="2" /><circle cx="544" cy="32" r="2" />
      <circle cx="608" cy="32" r="2" /><circle cx="672" cy="32" r="2" /><circle cx="736" cy="32" r="2" />
      <circle cx="800" cy="32" r="2" /><circle cx="864" cy="32" r="2" /><circle cx="928" cy="32" r="2" />
      <circle cx="992" cy="32" r="2" />
    </g>
    <use href="#dots" y="64" /><use href="#dots" y="128" /><use href="#dots" y="192" />
    <use href="#dots" y="256" /><use href="#dots" y="320" /><use href="#dots" y="384" />
    <use href="#dots" y="448" />
  </g>

  <!-- Left side: brand -->
  <g transform="translate(80 0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
    <!-- Route-divider brand mark (the app icon) -->
    <g transform="translate(0 116)">
      <g clip-path="url(#mark)" transform="scale(0.8)">
        <rect width="100" height="100" fill="#FC4C02" />
        <path d="M0 57 L22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33 L100 28 L100 100 L0 100 Z" fill="#5E9E2E" />
        <path d="M22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33" fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="22" cy="53" r="4.6" fill="#FFFFFF" />
        <circle cx="77" cy="33" r="4.6" fill="#FFFFFF" />
        <circle cx="72" cy="73.5" r="14.5" fill="#FFFFFF" />
        <g fill="none" stroke="#15191C" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M72 66.5 V76" /><path d="M66.8 71.6 L72 77 L77.2 71.6" /><path d="M66 80.5 H78" />
        </g>
      </g>
    </g>

    <text x="0" y="278" font-size="70" font-weight="700" fill="#15191C" letter-spacing="-1.5">
      Export GPX
    </text>
    <text x="0" y="338" font-size="33" font-weight="600" letter-spacing="-0.4">
      <tspan fill="#5E9E2E">for Komoot</tspan><tspan fill="#737373">, </tspan><tspan fill="#FC4C02">Strava</tspan>
    </text>
    <text x="0" y="392" font-size="22" fill="#525252">
      Tours, routes &amp; activities — ready for any device.
    </text>
  </g>

  <!-- Right side: stylized phone showing a route -->
  <g transform="translate(680 56)">
    <rect x="0" y="0" width="240" height="396" rx="32" ry="32"
          fill="#ffffff" stroke="#d4d4d4" stroke-width="2"
          filter="drop-shadow(0 10px 30px rgba(0,0,0,0.1))" />
    <rect x="12" y="12" width="216" height="372" rx="20" ry="20" fill="#fafafa" />

    <rect x="12" y="12" width="216" height="36" rx="20" ry="20" fill="#ffffff" />
    <rect x="12" y="32" width="216" height="16" fill="#ffffff" />
    <text x="120" y="36" text-anchor="middle" font-family="-apple-system, sans-serif"
          font-size="11" font-weight="600" fill="#15191C">Export GPX</text>

    <rect x="22" y="62" width="196" height="200" rx="10" fill="#ffffff" stroke="#e8e8e8" />
    <rect x="22" y="62" width="196" height="86" rx="10" fill="#f4f4f5" />
    <g transform="translate(120 105)">
      <path d="M -64 22 C -38 -8, -10 30, 10 8 S 38 -14, 60 -22"
            fill="none" stroke="#15191C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="-64" cy="22" r="3.5" fill="#ffffff" stroke="#15191C" stroke-width="1.6" />
      <circle cx="60" cy="-22" r="3.5" fill="#15191C" />
    </g>
    <rect x="36" y="160" width="48" height="14" rx="7" fill="#15191C" />
    <rect x="88" y="160" width="48" height="14" rx="7" fill="#ffffff" stroke="#FC4C02" />
    <text x="60" y="170" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="600" fill="#ffffff">Routes</text>
    <text x="112" y="170" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="600" fill="#FC4C02">Strava</text>
    <rect x="36" y="184" width="140" height="10" rx="2" fill="#15191C" opacity="0.7" />
    <rect x="36" y="200" width="100" height="8" rx="2" fill="#737373" opacity="0.5" />
    <rect x="36" y="232" width="80" height="20" rx="4" fill="#ffffff" stroke="#e5e5e5" />
    <text x="76" y="246" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#525252">Strava ↗</text>
    <rect x="124" y="232" width="56" height="20" rx="4" fill="#15191C" />
    <text x="152" y="246" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#ffffff">GPX</text>

    <rect x="22" y="280" width="196" height="100" rx="10" fill="#ffffff" stroke="#e8e8e8" />
    <rect x="22" y="280" width="196" height="60" rx="10" fill="#f4f4f5" />
    <g transform="translate(120 312)">
      <path d="M -50 18 C -28 0, -10 14, 8 -8 S 30 -10, 50 -16"
            fill="none" stroke="#15191C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
