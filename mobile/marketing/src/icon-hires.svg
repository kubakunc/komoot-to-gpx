<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 512×512 hi-res launcher icon for the Play listing.
       Komoot brand olive green background + white GPS route + export badge. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BBE26" />
      <stop offset="100%" stop-color="#5C9319" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" />

  <!-- Subtle white-dot graph paper texture, gives a "map" feel -->
  <g fill="rgba(255,255,255,0.10)">
    <circle cx="64" cy="64" r="2" /><circle cx="128" cy="64" r="2" />
    <circle cx="192" cy="64" r="2" /><circle cx="256" cy="64" r="2" />
    <circle cx="320" cy="64" r="2" /><circle cx="384" cy="64" r="2" />
    <circle cx="448" cy="64" r="2" />
    <circle cx="64" cy="128" r="2" /><circle cx="128" cy="128" r="2" />
    <circle cx="192" cy="128" r="2" /><circle cx="256" cy="128" r="2" />
    <circle cx="320" cy="128" r="2" /><circle cx="384" cy="128" r="2" />
    <circle cx="448" cy="128" r="2" />
    <circle cx="64" cy="192" r="2" /><circle cx="128" cy="192" r="2" />
    <circle cx="192" cy="192" r="2" /><circle cx="256" cy="192" r="2" />
    <circle cx="320" cy="192" r="2" /><circle cx="384" cy="192" r="2" />
    <circle cx="448" cy="192" r="2" />
    <circle cx="64" cy="256" r="2" /><circle cx="128" cy="256" r="2" />
    <circle cx="192" cy="256" r="2" /><circle cx="256" cy="256" r="2" />
    <circle cx="320" cy="256" r="2" /><circle cx="384" cy="256" r="2" />
    <circle cx="448" cy="256" r="2" />
    <circle cx="64" cy="320" r="2" /><circle cx="128" cy="320" r="2" />
    <circle cx="192" cy="320" r="2" /><circle cx="256" cy="320" r="2" />
    <circle cx="320" cy="320" r="2" /><circle cx="384" cy="320" r="2" />
    <circle cx="448" cy="320" r="2" />
    <circle cx="64" cy="384" r="2" /><circle cx="128" cy="384" r="2" />
    <circle cx="192" cy="384" r="2" /><circle cx="256" cy="384" r="2" />
    <circle cx="320" cy="384" r="2" /><circle cx="384" cy="384" r="2" />
    <circle cx="448" cy="384" r="2" />
    <circle cx="64" cy="448" r="2" /><circle cx="128" cy="448" r="2" />
    <circle cx="192" cy="448" r="2" /><circle cx="256" cy="448" r="2" />
    <circle cx="320" cy="448" r="2" /><circle cx="384" cy="448" r="2" />
    <circle cx="448" cy="448" r="2" />
  </g>

  <g transform="translate(256 256)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -100 48 C -64 14, -36 84, -8 38 S 50 -42, 86 -24 L 110 -52"
            stroke="rgba(0,0,0,0.20)" stroke-width="30" />
      <path d="M -100 48 C -64 14, -36 84, -8 38 S 50 -42, 86 -24 L 110 -52"
            stroke="#ffffff" stroke-width="16" />
    </g>

    <circle cx="-100" cy="48" r="15" fill="#5C9319" stroke="#ffffff" stroke-width="7" />
    <circle cx="110" cy="-52" r="15" fill="#ffffff" />

    <g transform="translate(86 86)">
      <circle r="40" fill="#ffffff" />
      <path d="M 0 -17 L 0 14 M -12 2 L 0 16 L 12 2"
            fill="none" stroke="#5C9319" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
