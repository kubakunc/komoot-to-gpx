<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2670" width="1200" height="2670" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- Play screenshot 3/4: activity detail + one-tap Export GPX. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" /><stop offset="100%" stop-color="#eef0f0" />
    </linearGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" /><stop offset="100%" stop-color="#fbfbfb" />
    </linearGradient>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3e6" /><stop offset="100%" stop-color="#e6efe0" />
    </linearGradient>
    <filter id="phoneShadow" x="-15%" y="-8%" width="130%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="rgba(0,0,0,0.16)" />
    </filter>
    <clipPath id="appiconClip"><rect width="100" height="100" rx="22.37" ry="22.37" /></clipPath>
    <symbol id="appicon" viewBox="0 0 100 100">
      <g clip-path="url(#appiconClip)">
        <rect width="100" height="100" fill="#FC4C02" />
        <path d="M0 57 L22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33 L100 28 L100 100 L0 100 Z" fill="#5E9E2E" />
        <path d="M22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33" fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="22" cy="53" r="4.6" fill="#FFFFFF" /><circle cx="77" cy="33" r="4.6" fill="#FFFFFF" />
        <circle cx="72" cy="73.5" r="14.5" fill="#FFFFFF" />
        <g fill="none" stroke="#15191C" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M72 66.5 V76" /><path d="M66.8 71.6 L72 77 L77.2 71.6" /><path d="M66 80.5 H78" />
        </g>
      </g>
    </symbol>
  </defs>

  <rect width="1200" height="2670" fill="url(#bg)" />
  <polygon points="0,0 1200,0 1200,150 0,420" fill="#5E9E2E" opacity="0.08" />

  <!-- Headline -->
  <g transform="translate(100 230)">
    <text x="0" y="70" font-size="72" font-weight="700" fill="#15191C" letter-spacing="-2">One tap to</text>
    <text x="0" y="158" font-size="72" font-weight="700" fill="#5E9E2E" letter-spacing="-2">GPX.</text>
    <text x="0" y="232" font-size="34" fill="#525252">Standard GPX 1.1, saved wherever you choose.</text>
  </g>

  <!-- Phone -->
  <g transform="translate(220 560)">
    <rect width="760" height="1880" rx="64" fill="url(#phoneBg)" stroke="#e4e4e7" stroke-width="2" filter="url(#phoneShadow)" />
    <rect x="22" y="22" width="716" height="1836" rx="46" fill="#ffffff" />
    <!-- status bar -->
    <text x="60" y="78" font-size="26" font-weight="600" fill="#15191C">9:03</text>
    <g transform="translate(700 70)" fill="#15191C"><rect x="-44" y="-16" width="34" height="18" rx="3" /></g>
    <!-- header: back + title -->
    <path d="M 78 142 l -22 -20 l 22 -20" fill="none" stroke="#15191C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="118" y="152" font-size="30" font-weight="700" fill="#15191C">Saturday Gravel Loop</text>
    <line x1="22" y1="186" x2="738" y2="186" stroke="#eee" stroke-width="2" />

    <!-- map -->
    <rect x="60" y="220" width="640" height="560" rx="24" fill="url(#mapBg)" />
    <path d="M 130 700 C 230 540, 330 640, 400 470 C 460 330, 560 380, 640 300"
          fill="none" stroke="#FC4C02" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="130" cy="700" r="16" fill="#fff" stroke="#FC4C02" stroke-width="7" />
    <circle cx="640" cy="300" r="16" fill="#FC4C02" />

    <!-- title + source -->
    <text x="60" y="868" font-size="40" font-weight="700" fill="#15191C">Saturday Gravel Loop</text>
    <text x="60" y="918" font-size="27" fill="#737373">Strava route · Gravel</text>

    <!-- stats row -->
    <g transform="translate(60 980)">
      <rect width="640" height="160" rx="22" fill="#f7f7f8" />
      <g text-anchor="middle">
        <text x="107" y="62" font-size="38" font-weight="700" fill="#15191C">68.4</text>
        <text x="107" y="104" font-size="24" fill="#737373">km</text>
        <text x="320" y="62" font-size="38" font-weight="700" fill="#15191C">720</text>
        <text x="320" y="104" font-size="24" fill="#737373">m climb</text>
        <text x="533" y="62" font-size="38" font-weight="700" fill="#15191C">3:12</text>
        <text x="533" y="104" font-size="24" fill="#737373">est. time</text>
      </g>
      <line x1="213" y1="46" x2="213" y2="114" stroke="#e6e6e9" stroke-width="2" />
      <line x1="427" y1="46" x2="427" y2="114" stroke="#e6e6e9" stroke-width="2" />
    </g>

    <!-- view on Strava + export -->
    <rect x="60" y="1180" width="300" height="100" rx="18" fill="#fff" stroke="#e3e3e6" stroke-width="2" />
    <text x="210" y="1242" text-anchor="middle" font-size="29" font-weight="600" fill="#525252">View on Strava ↗</text>

    <rect x="60" y="1320" width="640" height="118" rx="20" fill="#15191C" />
    <g transform="translate(258 1379)" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 -16 V 14" /><path d="M -12 4 L 0 16 L 12 4" /><path d="M -16 26 H 16" />
    </g>
    <text x="300" y="1392" font-size="36" font-weight="700" fill="#fff">Export GPX</text>
  </g>
</svg>
