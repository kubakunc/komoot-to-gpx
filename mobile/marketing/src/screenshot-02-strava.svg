<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2670" width="1200" height="2670" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- Play screenshot 2/4: Strava list, Routes/Activities filter, map previews. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" /><stop offset="100%" stop-color="#eef0f0" />
    </linearGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" /><stop offset="100%" stop-color="#fbfbfb" />
    </linearGradient>
    <filter id="phoneShadow" x="-15%" y="-8%" width="130%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="rgba(0,0,0,0.16)" />
    </filter>
    <clipPath id="appiconClip"><rect width="100" height="100" rx="22.37" ry="22.37" /></clipPath>
    <symbol id="appicon" viewBox="0 0 100 100">
      <g clip-path="url(#appiconClip)">
        <rect width="100" height="100" fill="#FC4C02" />
        <path d="M0 57 L22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33 L100 28 L100 100 L0 100 Z" fill="#5E9E2E" />
        <path d="M22 53 C 30 53, 33 43, 41 45 C 47 46, 50 59, 58 52 C 64 47, 69 35, 77 33" fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="22" cy="53" r="4.6" fill="#FFFFFF" /><circle cx="77" cy="33" r="4.6" fill="#FFFFFF" />
        <circle cx="72" cy="73.5" r="14.5" fill="#FFFFFF" />
        <g fill="none" stroke="#15191C" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M72 66.5 V76" /><path d="M66.8 71.6 L72 77 L77.2 71.6" /><path d="M66 80.5 H78" />
        </g>
      </g>
    </symbol>
    <!-- a reusable list-row map thumbnail -->
    <symbol id="thumb" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f1f1f3" /><path d="M 14 78 C 34 50, 50 72, 62 44 S 84 24, 90 18" fill="none" stroke="#FC4C02" stroke-width="6" stroke-linecap="round" /><circle cx="14" cy="78" r="6" fill="#fff" stroke="#FC4C02" stroke-width="4" /><circle cx="90" cy="18" r="6" fill="#FC4C02" /></symbol>
  </defs>

  <rect width="1200" height="2670" fill="url(#bg)" />
  <polygon points="0,0 1200,0 1200,150 0,420" fill="#FC4C02" opacity="0.07" />

  <!-- Headline -->
  <g transform="translate(100 230)">
    <text x="0" y="70" font-size="72" font-weight="700" fill="#15191C" letter-spacing="-2">Routes, rides &amp;</text>
    <text x="0" y="158" font-size="72" font-weight="700" fill="#15191C" letter-spacing="-2">planned <tspan fill="#FC4C02">tours.</tspan></text>
    <text x="0" y="232" font-size="34" fill="#525252">Switch source. Filter. Real map previews.</text>
  </g>

  <!-- Phone -->
  <g transform="translate(220 560)">
    <rect width="760" height="1880" rx="64" fill="url(#phoneBg)" stroke="#e4e4e7" stroke-width="2" filter="url(#phoneShadow)" />
    <rect x="22" y="22" width="716" height="1836" rx="46" fill="#ffffff" />
    <!-- status bar -->
    <text x="60" y="78" font-size="26" font-weight="600" fill="#15191C">9:03</text>
    <g transform="translate(700 70)" fill="#15191C"><rect x="-44" y="-16" width="34" height="18" rx="3" /></g>
    <!-- app header with source pill -->
    <use href="#appicon" x="60" y="118" width="42" height="42" />
    <text x="118" y="150" font-size="32" font-weight="700" fill="#15191C">Export GPX</text>
    <rect x="520" y="116" width="180" height="48" rx="24" fill="#fff" stroke="#FC4C02" stroke-width="2.5" />
    <circle cx="552" cy="140" r="9" fill="#FC4C02" />
    <text x="572" y="150" font-size="26" font-weight="600" fill="#FC4C02">Strava</text>
    <path d="M 668 134 l 10 10 l 10 -10" fill="none" stroke="#FC4C02" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="22" y1="186" x2="738" y2="186" stroke="#eee" stroke-width="2" />

    <!-- filter chips -->
    <rect x="60" y="220" width="180" height="64" rx="32" fill="#FC4C02" />
    <text x="150" y="262" text-anchor="middle" font-size="28" font-weight="600" fill="#fff">Routes</text>
    <rect x="256" y="220" width="216" height="64" rx="32" fill="#fff" stroke="#dcdce0" stroke-width="2" />
    <text x="364" y="262" text-anchor="middle" font-size="28" font-weight="600" fill="#737373">Activities</text>

    <!-- list rows -->
    <g transform="translate(60 330)">
      <!-- row 1 -->
      <g>
        <use href="#thumb" x="0" y="0" width="150" height="150" />
        <rect x="0" y="0" width="150" height="150" rx="18" fill="none" />
        <text x="180" y="48" font-size="32" font-weight="700" fill="#15191C">Saturday Gravel Loop</text>
        <text x="180" y="92" font-size="26" fill="#737373">68.4 km · 720 m ↑</text>
        <rect x="180" y="116" width="120" height="38" rx="19" fill="#fff3ec" />
        <text x="240" y="142" text-anchor="middle" font-size="22" font-weight="600" fill="#FC4C02">Route</text>
      </g>
      <line x1="0" y1="190" x2="640" y2="190" stroke="#f0f0f2" stroke-width="2" />
      <!-- row 2 -->
      <g transform="translate(0 220)">
        <use href="#thumb" x="0" y="0" width="150" height="150" />
        <text x="180" y="48" font-size="32" font-weight="700" fill="#15191C">Coast Road Classic</text>
        <text x="180" y="92" font-size="26" fill="#737373">112 km · 1 340 m ↑</text>
        <rect x="180" y="116" width="120" height="38" rx="19" fill="#fff3ec" />
        <text x="240" y="142" text-anchor="middle" font-size="22" font-weight="600" fill="#FC4C02">Route</text>
      </g>
      <line x1="0" y1="410" x2="640" y2="410" stroke="#f0f0f2" stroke-width="2" />
      <!-- row 3 -->
      <g transform="translate(0 440)">
        <use href="#thumb" x="0" y="0" width="150" height="150" />
        <text x="180" y="48" font-size="32" font-weight="700" fill="#15191C">Forest Singletrack</text>
        <text x="180" y="92" font-size="26" fill="#737373">31.7 km · 540 m ↑</text>
        <rect x="180" y="116" width="120" height="38" rx="19" fill="#fff3ec" />
        <text x="240" y="142" text-anchor="middle" font-size="22" font-weight="600" fill="#FC4C02">Route</text>
      </g>
      <line x1="0" y1="630" x2="640" y2="630" stroke="#f0f0f2" stroke-width="2" />
      <!-- row 4 -->
      <g transform="translate(0 660)">
        <use href="#thumb" x="0" y="0" width="150" height="150" />
        <text x="180" y="48" font-size="32" font-weight="700" fill="#15191C">Sunday Long Ride</text>
        <text x="180" y="92" font-size="26" fill="#737373">95.2 km · 980 m ↑</text>
        <rect x="180" y="116" width="120" height="38" rx="19" fill="#fff3ec" />
        <text x="240" y="142" text-anchor="middle" font-size="22" font-weight="600" fill="#FC4C02">Route</text>
      </g>
      <line x1="0" y1="850" x2="640" y2="850" stroke="#f0f0f2" stroke-width="2" />
      <!-- row 5 (fades) -->
      <g transform="translate(0 880)" opacity="0.55">
        <use href="#thumb" x="0" y="0" width="150" height="150" />
        <text x="180" y="48" font-size="32" font-weight="700" fill="#15191C">Hill Repeats</text>
        <text x="180" y="92" font-size="26" fill="#737373">22.0 km · 610 m ↑</text>
      </g>
    </g>
  </g>
</svg>
