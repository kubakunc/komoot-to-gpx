<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2670" width="1200" height="2670">
  <!-- Play Store promo screenshot: features highlight, share-from-Komoot. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#f0f0f0" />
    </linearGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BBE26" />
      <stop offset="100%" stop-color="#5C9319" />
    </linearGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fafafa" />
    </linearGradient>
    <filter id="phoneShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="rgba(0,0,0,0.10)" />
    </filter>
  </defs>

  <rect width="1200" height="2670" fill="url(#bg)" />

  <!-- Subtle diagonal green accent band -->
  <polygon points="0,2670 0,2440 1200,2100 1200,2280 0,2670" fill="#6AAB1E" opacity="0.07" />

  <!-- Dot grid texture -->
  <g fill="rgba(0,0,0,0.05)">
    <g id="row">
      <circle cx="60" cy="60" r="2.5" /><circle cx="180" cy="60" r="2.5" /><circle cx="300" cy="60" r="2.5" />
      <circle cx="420" cy="60" r="2.5" /><circle cx="540" cy="60" r="2.5" /><circle cx="660" cy="60" r="2.5" />
      <circle cx="780" cy="60" r="2.5" /><circle cx="900" cy="60" r="2.5" /><circle cx="1020" cy="60" r="2.5" />
      <circle cx="1140" cy="60" r="2.5" />
    </g>
    <use href="#row" y="120" /><use href="#row" y="240" /><use href="#row" y="360" />
  </g>

  <!-- ===== Header: brand + title ===== -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
    <g transform="translate(80 130)">
      <rect width="92" height="92" rx="20" ry="20" fill="url(#markBg)" />
      <g transform="translate(46 46)">
        <path d="M -28 16 C -18 4, -10 22, -2 10 S 14 -14, 22 -8 L 28 -16"
              fill="none" stroke="#ffffff" stroke-width="4.4"
              stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="-28" cy="16" r="3.8" fill="#5C9319" stroke="#ffffff" stroke-width="2" />
        <circle cx="28" cy="-16" r="3.8" fill="#ffffff" />
      </g>
    </g>

    <text x="200" y="180" font-size="62" font-weight="700" fill="#0a0a0a" letter-spacing="-1.6">Export GPX</text>
    <text x="200" y="232" font-size="36" font-weight="500" fill="#5C9319" letter-spacing="-0.5">for Komoot</text>
  </g>

  <!-- ===== Hero headline ===== -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" transform="translate(80 380)">
    <text x="0" y="0" font-size="92" font-weight="700" fill="#0a0a0a" letter-spacing="-2.4">Share from</text>
    <text x="0" y="100" font-size="92" font-weight="700" fill="#0a0a0a" letter-spacing="-2.4">Komoot.</text>
    <text x="0" y="200" font-size="92" font-weight="700" fill="#5C9319" letter-spacing="-2.4">Save as GPX.</text>
    <text x="0" y="270" font-size="34" fill="#525252" font-weight="400">Three taps. Straight from the Komoot app.</text>
  </g>

  <!-- ===== Two-phone flow: Komoot → Export GPX ===== -->
  <g transform="translate(0 780)" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
    <!-- Phone 1: Komoot tour with Share highlighted -->
    <g transform="translate(110 0)">
      <rect width="420" height="780" rx="44" fill="url(#phoneBg)" stroke="#e5e5e5" stroke-width="2" filter="url(#phoneShadow)" />
      <rect x="18" y="18" width="384" height="744" rx="30" fill="#ffffff" />
      <!-- Komoot-ish header -->
      <rect x="18" y="18" width="384" height="80" rx="30" fill="#6AAB1E" />
      <rect x="18" y="60" width="384" height="38" fill="#6AAB1E" />
      <text x="210" y="70" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">komoot</text>
      <!-- Map area -->
      <rect x="40" y="120" width="340" height="340" rx="12" fill="#eef3e6" />
      <path d="M 70 410 C 130 320, 200 380, 240 280 S 320 220, 360 170"
            fill="none" stroke="#6AAB1E" stroke-width="6" stroke-linecap="round" />
      <circle cx="70" cy="410" r="9" fill="#ffffff" stroke="#6AAB1E" stroke-width="4" />
      <circle cx="360" cy="170" r="9" fill="#6AAB1E" />
      <!-- Tour title -->
      <text x="40" y="510" font-size="28" font-weight="700" fill="#0a0a0a">Morning ride</text>
      <text x="40" y="546" font-size="18" fill="#737373">42.3 km · 580 m ↑</text>
      <!-- Share button highlighted -->
      <rect x="40" y="590" width="340" height="68" rx="34" fill="#ffffff" stroke="#0a0a0a" stroke-width="2.5" />
      <g transform="translate(100 624)">
        <circle cx="-26" cy="0" r="7" fill="#0a0a0a" />
        <circle cx="0" cy="-14" r="7" fill="#0a0a0a" />
        <circle cx="0" cy="14" r="7" fill="#0a0a0a" />
        <line x1="-20" y1="-4" x2="-6" y2="-12" stroke="#0a0a0a" stroke-width="2.5" />
        <line x1="-20" y1="4" x2="-6" y2="12" stroke="#0a0a0a" stroke-width="2.5" />
      </g>
      <text x="220" y="634" text-anchor="middle" font-size="22" font-weight="700" fill="#0a0a0a">Share</text>
      <!-- Tap ring on share button -->
      <circle cx="100" cy="624" r="44" fill="none" stroke="#5C9319" stroke-width="3.5" stroke-dasharray="5 5" />

      <text x="210" y="740" text-anchor="middle" font-size="24" font-weight="700" fill="#0a0a0a">1. Tap Share in Komoot</text>
    </g>

    <!-- Center arrow with brand-mark badge -->
    <g transform="translate(600 360)" font-family="-apple-system, sans-serif">
      <!-- Long arrow line -->
      <path d="M -30 0 L 30 0" stroke="#0a0a0a" stroke-width="5" stroke-linecap="round" />
      <path d="M 20 -14 L 44 0 L 20 14 Z" fill="#0a0a0a" />
      <!-- Brand badge above -->
      <g transform="translate(0 -80)">
        <rect x="-44" y="-44" width="88" height="88" rx="20" fill="url(#markBg)" filter="url(#phoneShadow)" />
        <g transform="translate(0 0)">
          <path d="M -26 14 C -18 4, -10 20, -2 8 S 12 -14, 20 -8 L 26 -14"
                fill="none" stroke="#ffffff" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="-26" cy="14" r="3.6" fill="#5C9319" stroke="#ffffff" stroke-width="1.8" />
          <circle cx="26" cy="-14" r="3.6" fill="#ffffff" />
        </g>
      </g>
      <text x="0" y="-130" text-anchor="middle" font-size="20" font-weight="700" fill="#0a0a0a">Export GPX</text>
      <text x="0" y="80" text-anchor="middle" font-size="16" fill="#525252">opens our app</text>
    </g>

    <!-- Phone 2: Our app — GPX saved -->
    <g transform="translate(670 0)">
      <rect width="420" height="780" rx="44" fill="url(#phoneBg)" stroke="#e5e5e5" stroke-width="2" filter="url(#phoneShadow)" />
      <rect x="18" y="18" width="384" height="744" rx="30" fill="#ffffff" />
      <!-- Our app header -->
      <rect x="18" y="18" width="384" height="80" rx="30" fill="#ffffff" />
      <rect x="18" y="60" width="384" height="38" fill="#ffffff" />
      <line x1="18" y1="98" x2="402" y2="98" stroke="#e5e5e5" stroke-width="1" />
      <g transform="translate(50 58)">
        <rect width="28" height="28" rx="6" fill="url(#markBg)" />
        <g transform="translate(14 14)">
          <path d="M -8 4 C -5 1, -3 6, -1 3 S 4 -4, 6 -2 L 8 -4"
                fill="none" stroke="#ffffff" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round" />
        </g>
      </g>
      <text x="92" y="76" font-size="20" font-weight="700" fill="#0a0a0a">Export GPX</text>
      <!-- Tour map -->
      <rect x="40" y="130" width="340" height="240" rx="12" fill="#f4f4f5" />
      <g transform="translate(210 250)">
        <path d="M -120 48 C -72 -10, -22 50, 16 6 S 64 -28, 116 -36"
              fill="none" stroke="#0a0a0a" stroke-width="3.5" stroke-linecap="round" />
        <circle cx="-120" cy="48" r="7" fill="#ffffff" stroke="#0a0a0a" stroke-width="2.5" />
        <circle cx="116" cy="-36" r="7" fill="#0a0a0a" />
      </g>
      <text x="40" y="410" font-size="28" font-weight="700" fill="#0a0a0a">Morning ride</text>
      <text x="40" y="446" font-size="18" fill="#737373">42.3 km · 580 m ↑ · 2h 14m</text>
      <!-- Success card -->
      <rect x="40" y="490" width="340" height="160" rx="18" fill="#f0f9e8" stroke="#7BBE26" stroke-width="2.5" />
      <g transform="translate(90 570)">
        <circle r="26" fill="#5C9319" />
        <path d="M -11 0 L -3 8 L 13 -8" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text x="138" y="556" font-size="22" font-weight="700" fill="#0a0a0a">GPX saved</text>
      <text x="138" y="586" font-size="16" fill="#525252">morning-ride.gpx</text>
      <text x="138" y="610" font-size="16" fill="#737373">Downloads · ready for your watch</text>

      <text x="210" y="740" text-anchor="middle" font-size="24" font-weight="700" fill="#0a0a0a">2. Saved as GPX</text>
    </g>
  </g>

  <!-- ===== Feature list ===== -->
  <g transform="translate(80 1620)" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
    <text x="0" y="0" font-size="46" font-weight="700" fill="#0a0a0a" letter-spacing="-1.2">Everything you need</text>
    <rect x="0" y="20" width="80" height="4" fill="#5C9319" />

    <!-- Feature row template -->
    <g transform="translate(0 80)">
      <!-- 1: Share from Komoot -->
      <g>
        <rect width="72" height="72" rx="16" fill="#0a0a0a" />
        <g transform="translate(36 36)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
          <circle cx="-12" cy="0" r="7" fill="#ffffff" />
          <circle cx="12" cy="-12" r="7" fill="#ffffff" />
          <circle cx="12" cy="12" r="7" fill="#ffffff" />
          <line x1="-6" y1="-4" x2="6" y2="-10" />
          <line x1="-6" y1="4" x2="6" y2="10" />
        </g>
        <text x="100" y="36" font-size="30" font-weight="700" fill="#0a0a0a">Share from the Komoot app</text>
        <text x="100" y="68" font-size="22" fill="#525252">Hit Share on any tour — it opens here, ready to export.</text>
      </g>

      <!-- 2: Private tours -->
      <g transform="translate(0 130)">
        <rect width="72" height="72" rx="16" fill="#0a0a0a" />
        <g transform="translate(36 36)" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round">
          <rect x="-13" y="-4" width="26" height="20" rx="3" fill="#ffffff" stroke="none" />
          <path d="M -8 -4 V -10 a 8 8 0 0 1 16 0 V -4" />
        </g>
        <text x="100" y="36" font-size="30" font-weight="700" fill="#0a0a0a">Works on private tours</text>
        <text x="100" y="68" font-size="22" fill="#525252">Sign in with Komoot. Your tours stay private.</text>
      </g>

      <!-- 3: Filter -->
      <g transform="translate(0 260)">
        <rect width="72" height="72" rx="16" fill="#0a0a0a" />
        <g transform="translate(36 36)" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round">
          <line x1="-18" y1="-12" x2="18" y2="-12" />
          <line x1="-12" y1="0" x2="12" y2="0" />
          <line x1="-6" y1="12" x2="6" y2="12" />
        </g>
        <text x="100" y="36" font-size="30" font-weight="700" fill="#0a0a0a">Filter Completed or Planned</text>
        <text x="100" y="68" font-size="22" fill="#525252">Find the right tour fast. Browse with real map thumbnails.</text>
      </g>

      <!-- 4: GPX ready -->
      <g transform="translate(0 390)">
        <rect width="72" height="72" rx="16" fill="url(#markBg)" />
        <g transform="translate(36 36)" fill="#ffffff">
          <text x="0" y="6" text-anchor="middle" font-size="20" font-weight="800" font-family="sans-serif">GPX</text>
        </g>
        <text x="100" y="36" font-size="30" font-weight="700" fill="#0a0a0a">Standard GPX 1.1</text>
        <text x="100" y="68" font-size="22" fill="#525252">Drop it on your Garmin, Wahoo, Hammerhead, watch — anywhere.</text>
      </g>
    </g>
  </g>

  <!-- ===== Footer brand ===== -->
  <g font-family="-apple-system, sans-serif" transform="translate(80 2540)">
    <text x="0" y="0" font-size="20" fill="#737373">by VeloLogic Labs · Not affiliated with komoot GmbH</text>
  </g>
</svg>
